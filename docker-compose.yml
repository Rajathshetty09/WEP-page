services:
  backend:
    build: ./python-jenkins-argocd-k8s  # Update this to the folder containing your backend Dockerfile
    ports:
      - "5000:5000"
    restart: always

  frontend:
    build: ./python-jenkins-argocd-k8s  # Update this to the folder containing your frontend Dockerfile
    ports:
      - "3001:3000"
    depends_on:
      - backend
    restart: always
